            <div class="colonna-destra">

                <div class="music-box">
                    <p class="music-box-title">Music</p>

                    <div class="spotify-player">
                        <p class="spotify-title">My current favourite track</p>
                        <iframe data-testid="embed-iframe" style="border-radius:12px"
                            src="https://open.spotify.com/embed/track/4zgHtuasZkiZu1caZwxF5P?utm_source=generator"

                            loading="lazy"></iframe>
                    </div>

                    <div class="spotify-player">
                        <p class="spotify-title">My current favourite playlist</p>
                        <iframe data-testid="embed-iframe" style="border-radius:12px"
                            src="https://open.spotify.com/embed/playlist/7ckLkG38SS1w2SLi9QWE3b?utm_source=generator&theme=0"
                            width="100%" height="152" frameBorder="0" allowfullscreen=""

                            loading="lazy"></iframe>
                    </div>

                    <hr style="border: 0; border-top: 1px dashed #31818C; margin: 30px 0; opacity: 0.5;">

                    <div class="inner-album-section">
                        <p class="spotify-title" style="margin-bottom: 20px; font-size: 0.95rem;">Album consigliati</p>

                        <div class="carousel-container">

                            <div class="album-card active">
                                <img src="/assets/immagini/Jimi-Hendrix-Band-Of-Gypsys-album-cover.jpg" class="album-cover" alt="Band of Gypsys">
                                <div class="album-info">
                                    <h3 class="album-title">Band of Gypsys</h3>
                                    <p class="album-artist">Jimi Hendrix</p>
                                    <p class="album-desc">Un live monumentale. La chitarra di Jimi qui tocca vette espressive e funk incredibili.</p>
                                </div>
                            </div>

                            </div> <div class="carousel-controls">
                            <button id="prevBtn" class="uiverse-button">
                                <span class="button_top">← Prev</span>
                            </button>
                            <button id="nextBtn" class="uiverse-button">
                                <span class="button_top">Next →</span>
                            </button>
                        </div>
                    </div> </div> <p class="descrizione">Work in progress...</p>
                
            </div> </div> </div> <script>
        document.addEventListener("DOMContentLoaded", function () {
            const cards = document.querySelectorAll('.album-card');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            let currentIndex = 0;

            function showCard(index) {
                // Se non ci sono card o ne è rimasta solo una attiva (perché le altre sono commentate) ferma la funzione
                if (cards.length <= 1) return;

                // Rimuove la classe attiva da tutte le card
                cards.forEach(card => card.classList.remove('active'));

                // Gestione del loop infinito del carosello
                if (index >= cards.length) {
                    currentIndex = 0;
                } else if (index < 0) {
                    currentIndex = cards.length - 1;
                } else {
                    currentIndex = index;
                }

                // Mostra la card corrente
                cards[currentIndex].classList.add('active');
            }

            // Event Listeners per i bottoni
            nextBtn.addEventListener('click', () => {
                showCard(currentIndex + 1);
            });

            prevBtn.addEventListener('click', () => {
                showCard(currentIndex - 1);
            });
        });
    </script>

</body>
